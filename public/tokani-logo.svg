<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1A34;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#3C7DD9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E94A64;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle inner glow -->
    <radialGradient id="innerGlow" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Main circular background -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGradient)"/>
  <circle cx="100" cy="100" r="98" fill="url(#innerGlow)"/>
  
  <!-- Outer ring for depth -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  
  <!-- Ocean waves representing Pacific travel -->
  <g opacity="0.4">
    <path d="M 30 115 Q 55 105, 80 115 T 130 115 T 170 115" 
          stroke="#FFFFFF" 
          stroke-width="3.5" 
          fill="none" 
          stroke-linecap="round"/>
    <path d="M 30 130 Q 55 120, 80 130 T 130 130 T 170 130" 
          stroke="#FFFFFF" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round"/>
    <path d="M 40 145 Q 65 138, 90 145 T 140 145 T 160 145" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          fill="none" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Modern airplane icon -->
  <g transform="translate(100, 70)">
    <!-- Main fuselage -->
    <path d="M -28 0 L 30 0 L 35 5 L 30 0 L 35 -5 L 30 0 Z" 
          fill="#FFFFFF" 
          stroke="#FFFFFF" 
          stroke-width="1"/>
    
    <!-- Body detail -->
    <ellipse cx="0" cy="0" rx="28" ry="4.5" fill="#FFFFFF"/>
    
    <!-- Wings -->
    <path d="M -12 -4.5 L -30 -25 L -8 -4.5 Z" fill="#FFFFFF"/>
    <path d="M -12 4.5 L -30 25 L -8 4.5 Z" fill="#FFFFFF"/>
    
    <!-- Tail fin -->
    <path d="M 25 -4.5 L 35 -15 L 28 0 Z" fill="#FFFFFF"/>
    <path d="M 25 4.5 L 35 15 L 28 0 Z" fill="#FFFFFF"/>
    
    <!-- Cockpit windows -->
    <circle cx="-20" cy="0" r="2.5" fill="#3C7DD9" opacity="0.8"/>
    <circle cx="-14" cy="0" r="2" fill="#3C7DD9" opacity="0.6"/>
    
    <!-- Engine detail -->
    <circle cx="5" cy="0" r="3" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Subtle 'T' monogram in background -->
  <text x="100" y="55" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="52" 
        font-weight="bold" 
        fill="#FFFFFF" 
        text-anchor="middle"
        opacity="0.15">T</text>
  
  <!-- Motion trail dots -->
  <g opacity="0.3">
    <circle cx="50" cy="70" r="2" fill="#FFFFFF"/>
    <circle cx="60" cy="72" r="1.5" fill="#FFFFFF"/>
    <circle cx="40" cy="68" r="1.5" fill="#FFFFFF"/>
  </g>
</svg>
